spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6370  # intentionally wrong port — RedisTemplate won't be called in tests
  mail:
    host: localhost
    port: 25
    username: test
    password: test

pipeline:
  control-flag-key: pipeline:control:flag
  dedup-ttl-days: 180
  schedule-cron: "0 0 3 * * *"
  calibration-cron: "0 0 4 * * MON"
  themes-active: test-theme
  max-candidates-per-theme: 5
  min-fresh-articles-per-theme: 1
  summary-word-min: 90
  summary-word-max: 110
  relevance-threshold: 7
  innovation-threshold: 6
  featured-relevance-threshold: 9
  featured-innovation-threshold: 9
  image-width: 1200
  image-height: 630
  article-fetch-words: 500
  max-summary-retries: 1
  banned-terms: revolutionary

ollama:
  api-url: http://localhost:11434/api/chat
  model: llama3.1
  stream: false

search:
  api-url: https://serpapi.com/search
  api-key: test-key
  results-per-query: 5

stock-photo:
  api-url: https://api.unsplash.com/search/photos
  api-key: test-key

cms:
  api-url: http://localhost:1337
  api-key: test-key

admin:
  email: test@example.com
  api-key: test-admin-key

image:
  upload-dir: uploads/test-images
  base-url: http://localhost:8080/images
